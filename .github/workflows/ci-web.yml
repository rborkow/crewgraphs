name: Web CI

on:
  pull_request:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run typecheck
      - run: bun run --cwd apps/web test
      - run: bun run --cwd packages/contracts test
      - run: bun run --cwd apps/web build:worker
        env:
          # Lets wrangler initialize the HYPERDRIVE binding at build time; no
          # queries run during the build (routes are dynamic, error-page
          # prerenders degrade without a database).
          CLOUDFLARE_HYPERDRIVE_LOCAL_CONNECTION_STRING_HYPERDRIVE: postgres://placeholder:placeholder@localhost:5432/placeholder
