name: Web CI

on:
  pull_request:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run typecheck
      - run: bun run --cwd apps/web test
      - run: bun run --cwd packages/contracts test
      - run: bun run --cwd apps/web build:worker
